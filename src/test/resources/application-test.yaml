poputka:
  trip-booking-review:
    draft-to-moderation-delay: 1h
    moderator-usernames:
      - testuser

spring:
  jpa:
    hibernate:
      ddl-auto: validate
  datasource:
    url: jdbc:tc:postgresql:16:///test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    hikari:
      connection-init-sql: SELECT 1
  sql:
    init:
      mode: always
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-tests.yaml
