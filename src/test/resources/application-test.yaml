poputka:
  auth:
    jwt-secret: test-jwt-secret-change-me-32bytes-min
    google-client-id: test-google-client-id
    apple-audience: com.poputka.test.apple.service
  trip-booking-review:
    draft-to-moderation-delay: 1h
    moderator-usernames:
      - testuser

spring:
  jpa:
    hibernate:
      ddl-auto: validate
  datasource:
    url: jdbc:tc:postgresql:16:///test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test
    hikari:
      connection-init-sql: SELECT 1
  mail:
    host: 127.0.0.1
    port: 2525
    username: test
    password: test
  sql:
    init:
      mode: always
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-tests.yaml

notification:
  admin:
    telegramChatId: "-1"
    telegramCredentials: ""
    adminEmail: admin-test@example.invalid

application:
  storage:
    documents: ${java.io.tmpdir}/poputka-api-test-docs
