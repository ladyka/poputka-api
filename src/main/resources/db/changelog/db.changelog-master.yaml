        - column:
            name: ride_id
            type: bigint
            constraints:
              primaryKey: true
              nullable: false
        - column:
            name: father_ride_id
            type: bigint
        - column:
            name: from_place_now
            type: varchar(255)
        - column:
            name: to_place_now
            type: varchar(255)
        - column:
            name: day
            type: smallint
        - column:
            name: month_name
            type: varchar(10)
        - column:
            name: car
            type: text
        - column:
            name: driver_wishes
            type: text
        - column:
            name: price
            type: smallint
        - column:
            name: valuta_short
            type: varchar(5)
        - column:
            name: time_start
            type: smallint
        - column:
            name: user_nickname
            type: varchar(36)
        - column:
            name: created_by
            type: varchar(36)
        - column:
            name: created_datetime
            type: bigint
        - column:
            name: modified_by
            type: varchar(36)
        - column:
            name: modified_datetime
            type: bigint
        - column:
            name: version
            type: smallint

