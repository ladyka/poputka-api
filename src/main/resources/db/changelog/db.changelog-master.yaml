- changeSet:
    id: 2025-06-10-add_trips_users_relation
    author: Alexey Lobachev
    changes:
    - addForeignKeyConstraint:
        baseColumnNames: owner_id
        baseTableName: trips
        constraintName: fk_trips_users
        onDelete: SET NULL
        referencedColumnNames: id
        referencedTableName: users

- changeSet:
    id: 2025-06-10-booking
    author: Alexey Lobachev
    changes:
    - createTable:
        tableName: booking
        columns:
        - column:
            name: id
            type: VARCHAR(36)
            defaultValueComputed: ${uuid}
            constraints:
              primaryKey: true
        - column:
            name: trip_id
            type: bigint
            constraints:
              nullable: false
              foreignKeyName: fk_booking_trips
              references: trips(id)
        - column:
            name: passenger_id
            type: bigint
            constraints:
              nullable: false
              foreignKeyName: fk_booking_users
              references: users(id)
        - column:
            name: booking_status
            type: varchar(32)
            constraints:
              checkConstraint: "booking_status IN ('WAITING', 'ACCEPTED', 'REJECTED')"
        - column:
            name: created_user
            type: varchar(36)
            constraints:
              nullable: false
        - column:
            name: created_datetime
            type: bigint
            constraints:
              nullable: false
        - column:
            name: modified_user
            type: varchar(36)
        - column:
            name: modified_datetime
            type: bigint
        - column:
            name: version
            type: smallint
            constraints:
              nullable: false

- changeSet:
    id: 2025-06-10-message
    author: Alexey Lobachev
    changes:
    - createTable:
        tableName: message
        columns:
        - column:
            name: id
            type: VARCHAR(36)
            defaultValueComputed: ${uuid}
            constraints:
              primaryKey: true
        - column:
            name: booking_id
            type: VARCHAR(36)
            constraints:
              nullable: false
              foreignKeyName: fk_message_booking
              references: booking(id)
        - column:
            name: sender_id
            type: bigint
            constraints:
              nullable: false
              foreignKeyName: fk_message_users
              references: users(id)
        - column:
            name: content
            type: text
            constraints:
              nullable: false
        - column:
            name: message_status
            type: varchar(32)
            constraints:
              checkConstraint: "message_status IN ('SENT', 'DELIVERED', 'READ')"
        - column:
            name: created_user
            type: varchar(36)
            constraints:
              nullable: false
        - column:
            name: created_datetime
            type: bigint
            constraints:
              nullable: false
        - column:
            name: modified_user
            type: varchar(36)
        - column:
            name: modified_datetime
            type: bigint
        - column:
            name: version
            type: smallint
            constraints:
              nullable: false
