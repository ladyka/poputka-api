databaseChangeLog:
- changeSet:
    id: 2024-06-05-final
    author: Andrei Ladyka
    changes:
    - sql: DROP TABLE IF EXISTS poputka_tg_rides;
    - createTable:
        tableName: poputka_tg_rides
        columns:
        - column:
            name: ride_id
            type: int
            constraints:
              primaryKey: true
              nullable: false
        - column:
            name: father_ride_id
            type: int
        - column:
            name: from_place_now
            type: varchar(255)
        - column:
            name: to_place_now
            type: varchar(255)
        - column:
            name: day
            type: int
        - column:
            name: month_name
            type: varchar(10)
        - column:
            name: car
            type: text
        - column:
            name: driver_wishes
            type: text
        - column:
            name: price
            type: smallint
        - column:
            name: valuta_short
            type: varchar(5)
        - column:
            name: time_start
            type: smallint
        - column:
            name: user_nickname
            type: varchar(50)
        - column:
            name: created_by
            type: varchar(50)
        - column:
            name: created_datetime
            type: bigint
        - column:
            name: modified_by
            type: varchar(50)
        - column:
            name: modified_datetime
            type: bigint
        - column:
            name: version
            type: smallint

- changeSet:
    id: 2024-06-11-users-final
    author: Andrei Ladyka
    changes:
    - sql: DROP TABLE IF EXISTS users;
    - createTable:
        tableName: users
        columns:
        - column:
            name: id
            type: int
            autoIncrement: true
            constraints:
              unique: true
              primaryKey: true
              nullable: false
        - column:
            name: username
            type: varchar(255)
        - column:
            name: password
            type: varchar(255)
        - column:
            name: name
            type: varchar(255)
        - column:
            name: surname
            type: varchar(255)
        - column:
            name: birthday
            type: date
        - column:
            name: music
            type: text
        - column:
            name: business_activity
            type: text
        - column:
            name: description
            type: text
        - column:
            name: car
            type: text
        - column:
            name: created_by
            type: varchar(50)
        - column:
            name: created_datetime
            type: int
        - column:
            name: modified_by
            type: varchar(50)
        - column:
            name: modified_datetime
            type: int
        - column:
            name: version
            type: smallint

- changeSet:
    id: 2024-06-14-trips-final
    author: Andrei Ladyka
    changes:
    - sql: DROP TABLE IF EXISTS trips;
    - createTable:
        tableName: trips
        columns:
        - column:
            name: id
            type: bigint
            autoIncrement: true
            constraints:
              unique: true
              primaryKey: true
              nullable: false
        - column:
            name: place_from
            type: VARCHAR(255)
            constraints:
              nullable: false
        - column:
            name: place_to
            type: VARCHAR(255)
            constraints:
              nullable: false
        - column:
            name: start
            type: bigint
            constraints:
              nullable: false
        - column:
            name: price
            type: DECIMAL(19,2)
            constraints:
              nullable: false
        - column:
            name: currency
            type: VARCHAR(255)
            constraints:
              nullable: false
        - column:
            name: description
            type: TEXT
        - column:
            name: passengers
            type: TINYINT
            constraints:
              nullable: false
        - column:
            name: owner_id
            type: bigint
            constraints:
              nullable: false
        - column:
            name: created_by
            type: varchar(50)
            constraints:
              nullable: false
        - column:
            name: created_datetime
            type: bigint
            constraints:
              nullable: false
        - column:
            name: modified_by
            type: varchar(50)
        - column:
            name: modified_datetime
            type: bigint
        - column:
            name: version
            type: smallint
            constraints:
              nullable: false

- changeSet:
    id: 2024-06-17-users-addTelegramColumns
    author: Andrei Ladyka
    changes:
    - addColumn:
        tableName: users
        columns:
        - column:
            name: telegram_id
            type: VARCHAR(255)
        - column:
            name: telegram_username
            type: VARCHAR(255)
