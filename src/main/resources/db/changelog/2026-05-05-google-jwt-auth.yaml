databaseChangeLog:
  - changeSet:
      id: 2026-05-05-users-google-columns
      author: poputka-api
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: google_sub
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: google_email
                  type: varchar(255)
                  constraints:
                    nullable: true
        - addUniqueConstraint:
            tableName: users
            columnNames: google_sub
            constraintName: uk_users_google_sub

  - changeSet:
      id: 2026-05-05-refresh-tokens-table
      author: poputka-api
      changes:
        - createTable:
            tableName: refresh_tokens
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: token_hash
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: revoked_at
                  type: timestamptz
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: user_agent
                  type: varchar(512)
                  constraints:
                    nullable: true
              - column:
                  name: ip_address
                  type: varchar(64)
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            baseTableName: refresh_tokens
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_refresh_tokens_users
            onDelete: CASCADE
        - createIndex:
            indexName: idx_refresh_tokens_token_hash
            tableName: refresh_tokens
            columns:
              - column:
                  name: token_hash
