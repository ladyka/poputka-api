databaseChangeLog:
  - changeSet:
      id: 2026-04-28-trips-add-place-fields
      author: cursor
      changes:
        - addColumn:
            tableName: trips
            columns:
              - column:
                  name: place_from_city
                  type: VARCHAR(255)
              - column:
                  name: place_from_display_name
                  type: TEXT
              - column:
                  name: place_from_osm_id
